<div class="container my-5">

    <h2 class="text-center mb-4">Our Products</h2>

    
    <div class="text-center mb-4">

        <button
            class="btn me-2"
            [class.btn-primary]="currentCategory === 'smartphones'"
            [class.btn-outline-primary]="currentCategory !== 'smartphones'"
            (click)="loadCategory('smartphones')">

            📱 Smartphones

        </button>

        <button
            class="btn"
            [class.btn-primary]="currentCategory === 'mobile-accessories'"
            [class.btn-outline-primary]="currentCategory !== 'mobile-accessories'"
            (click)="loadCategory('mobile-accessories')">

            🎧 Mobile Accessories

        </button>

    </div>

    
    <div class="row mb-4">

        <div class="col-md-6 mx-auto">

            <input
                type="text"
                class="form-control"
                placeholder="🔍 Search by product name or brand..."
                [(ngModel)]="searchText"
                (input)="searchProducts()">

        </div>

    </div>

    
    <div class="text-center" *ngIf="loading">

        <div class="spinner-border text-primary" role="status"></div>

        <p class="mt-3">Loading products...</p>

    </div>

    
    <div class="row g-4" *ngIf="!loading">

        <div
            class="col-lg-3 col-md-4 col-sm-6"
            *ngFor="let product of filteredProducts">

            <div class="card h-100 shadow-sm">

                <img
                    [src]="product.thumbnail"
                    class="card-img-top p-3"
                    [alt]="product.title"
                    height="220">

                <div class="card-body d-flex flex-column">

                    <h5 class="card-title">
                        {{ product.title }}
                    </h5>

                    <p class="text-muted mb-1">
                        {{ product.brand }}
                    </p>

                    <p class="mb-2">
                        ⭐ {{ product.rating }}
                    </p>

                    <h4 class="text-success">
                        ${{ product.price }}
                    </h4>

                    <div class="mt-auto">

                        <a
                            class="btn btn-primary w-100 mb-2"
                            [routerLink]="['/product', product.id]">
                            View Details
                        </a>

                        <button
                            class="btn btn-warning w-100"
                            (click)="addToCart(product)">
                            Add to Cart
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    
    <div
        class="text-center mt-5"
        *ngIf="!loading && filteredProducts.length === 0">

        <h4>No products found.</h4>

    </div>

</div>
